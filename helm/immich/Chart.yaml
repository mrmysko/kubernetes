apiVersion: v2
name: Immich
description: A Helm chart for Immich. Connecting to a clustered CNPG postgres database.
type: application
version: 0.3.0
appVersion: "v2.0.0"

dependencies:
  - name: common-labels
    version: 0.1.0
    repository: "file://../library/common-labels"

  - name: default-svc
    version: 0.1.0
    repository: "file://../library/default-svc"

  - name: cnpg-database
    version: 0.1.0
    repository: "file://../library/cnpg-database"
    alias: mainDb

  - name: redis
    version: 0.1.0
    repository: "file://../library/redis"
