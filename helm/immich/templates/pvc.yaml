kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ print .Release.Name "-upload-pvc" | quote }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  volumeName: {{ print .Release.Name "-upload-pv" | quote }}
  storageClassName: ""
