# Traefik middleware to proxy things through Authelia
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: "authelia-forward-auth"
  namespace: "{{ .Values.config.traefik.namespace }}"
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  forwardAuth:
    address: "{{ .Values.config.forwardAuth.address }}"
    trustForwardHeader: true
    authResponseHeaders:
      - "Remote-User"
      - "Remote-Groups"
      - "Remote-Name"
      - "Remote-Email"
    authRequestHeaders:
      - Authorization
      - Cookie
