apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: {{ .Release.Name | quote }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  replicas: {{ .Values.app.replicaCount | default 3 }}

  service:
    type: ClusterIP
    sessionAffinity: None

  storage:
    size: 25Gi
    storageClassName: local-storage

  tls:
    enabled: true
    required: false
    serverCertIssuerRef:
      name: cluster-ca
      kind: ClusterIssuer

  maxScaleRef:
    name: {{ print .Release.Name "-maxscale" | quote }}

  galera:
    enabled: true
    primary:
      podIndex: 0
      autoFailover: true
    agent:
      kubernetesAuth:
        enabled: true

    config:
      reuseStorageVolume: false
      volumeClaimTemplate:
        resources:
          requests:
            storage: 100Mi
        accessModes:
          - ReadWriteOnce
        storageClassName: local-storage

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]

  rootPasswordSecretKeyRef:
    name: {{ print .Release.Name "-secret" | quote }}
    key: ROOT_PASSWORD

  myCnf: |
    [mariadb-backup]
    ssl-ca = /etc/pki/ca.crt

    [mysqld]
    character-set-server = utf8mb4
    collation-server = utf8mb4_unicode_ci