apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaContactPoint
metadata:
  name: {{ print .Release.Name "-contactpoint" | quote }}
spec:
  name: SMTP
  instanceSelector:
    matchLabels:
      dashboards: grafana
  # Editing ContactPoints in the UI is disabled by default
  editable: true # editable is immutable and can only be set at creation
  receivers:
    - type: email
      settings:
        subject: Grafana Alert
      valuesFrom:
        - targetPath: addresses
          valueFrom:
            secretKeyRef:
              name: {{ print .Release.Name "-contactpoint-secret" | quote }}
              key: alert-mails