apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: "victoriametrics-internal"
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  datasource:
    access: proxy
    type: prometheus
    jsonData:
      timeInterval: 5s
      # Fix...doesnt trust my internal CA certificate
      tlsSkipVerify: {{ .Values.config.datasource.tlsSkipVerify }}
    name: VictoriaMetrics-Internal
    url: "{{ .Values.config.datasource.vm.url }}"
  instanceSelector:
    matchLabels:
      dashboards: grafana
  plugins:
    - name: "{{ .Values.config.datasource.vm.pluginName }}"
      version: {{ .Values.config.datasource.vm.version }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
