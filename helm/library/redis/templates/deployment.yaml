{{- define "redis.deployment" -}}
{{- $root := .root | default . }}
{{- $vals := .vals | default $root.Values }}
{{- $fullname := include "redis.fullname" (dict "root" $root) }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "common.labels" $root | nindent 4 }}
    app.kubernetes.io/component: cache

spec:
  revisionHistoryLimit: 3
  replicas: {{ $vals.replicaCount | default 1 }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $root.Release.Name | quote }}
      app.kubernetes.io/component: cache

  template:
    metadata:
      labels:
        {{- include "common.labels" $root | nindent 8 }}
        app.kubernetes.io/component: cache

    spec:
      containers:
        - name: {{ $fullname }}
          image: "11notes/redis:8"
          imagePullPolicy: IfNotPresent
          args:
            - --in-memory

          ports:
            - containerPort: {{ $vals.port }}

          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-secret" $root.Release.Name }}
                  key: REDIS_PASSWORD

          {{- with $vals.resources }}
          resources:
          {{ toYaml . | nindent 12 }}
          {{- end }}

          {{- with $vals.livenessProbe }}
          livenessProbe:
          {{ toYaml . | nindent 12 }}
          {{- end }}

          {{- with $vals.readinessProbe }}
          readinessProbe:
          {{ toYaml . | nindent 12 }}
          {{- end }}

          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
{{- end }}