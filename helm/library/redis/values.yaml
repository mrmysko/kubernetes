replicaCount: 1
port: 6379

resources:
  requests:
    cpu: "250m"
    memory: "64Mi"
  limits:
    memory: "256Mi"

livenessProbe:
  exec:
    command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  exec:
    command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
  initialDelaySeconds: 5
  periodSeconds: 10
