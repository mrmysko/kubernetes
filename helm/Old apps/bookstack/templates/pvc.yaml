apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ print .Release.Name "-pvc" | quote }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{ .Values.storage.size | default "3Gi" }}
