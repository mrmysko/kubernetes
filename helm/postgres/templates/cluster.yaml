apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ print .Release.Name "-cluster" | quote }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  instances: {{ .Values.replicaCount }}
  imageName: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
  imagePullPolicy: IfNotPresent

  postgresql:
    synchronous:
      method: any
      number: 1
    shared_preload_libraries:
      - "vchord.so"

  certificates:
    serverTLSSecret: {{ print .Release.Name "-server-cert" | quote }}
    serverCASecret: {{ print .Release.Name "-server-cert" | quote }}

  managed:
    roles:
  {{- range .Values.database.users }}
    - name: "{{ .name }}"
      ensure: present
      comment: "{{ .comment }}"
      login: {{ default true .login }}
      superuser: {{ default false .superuser }}
      passwordSecret:
        name: "{{ .name }}-credentials"
  {{- end }}

  storage:
    storageClass: local-storage
    size: 25Gi

  plugins:
  {{- if .Values.backup.enabled }}
  - name: barman-cloud.cloudnative-pg.io
    isWALArchiver: true
    parameters:
      barmanObjectName: {{ print .Release.Name "-backup-storage" | quote }}
  {{- end }}