# This requires traefik crds - https://doc.traefik.io/traefik/getting-started/quick-start-with-kubernetes/
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: "{{ .Release.Name }}-route"
  labels:
    {{- include "common.labels" . | nindent 4 }}
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: VictoriaMetrics
    gethomepage.dev/description: Metrics Server
    gethomepage.dev/icon: si-victoriametrics
    gethomepage.dev/href: "https://{{ .Values.ingress.baseUrl }}/select/0/vmui"
    gethomepage.dev/pod-selector: "app.kubernetes.io/name=vmselect"
    gethomepage.dev/group: Frontend
    gethomepage.dev/weight: "10"
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.baseUrl }}`) && PathPrefix(`/select`)
      priority: 100
      services:
        - kind: Service
          name: "vmselect-{{ .Release.Name }}"
          port: 8481
      middlewares:
        - name: "authelia-forward-auth"
          namespace: traefik

    - kind: Rule
      match: Host(`{{ .Values.ingress.baseUrl }}`) && PathPrefix(`/insert`)
      priority: 90
      services:
        - name: "vminsert-{{ .Release.Name }}"
          port: 8480
      #middlewares:
      #  - name: "authelia-forward-auth"
      #    namespace: traefik