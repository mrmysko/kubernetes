{{ include "baseResources.service" . }}
---
{{ include "baseResources.ingress" . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name | quote }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  revisionHistoryLimit: 3
  replicas: {{ .Values.app.replicaCount | default 1 }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "common.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      enableServiceLinks: false
      securityContext:
        fsGroup: {{ .Values.app.gid }}

      initContainers:
        - {{ include "baseResources.waitForMariadb" . | nindent 10 }}

        - {{ include "baseResources.waitForSamba" . | nindent 10 }}

      containers:
        - {{ include "baseResources.baseContainer" . | nindent 10 }}

          ports:
            - containerPort: {{ .Values.service.port }}

          securityContext:
            runAsUser: {{ .Values.app.uid }}
            runAsGroup: {{ .Values.app.gid }}
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          envFrom:
            - configMapRef:
                name: {{ print .Release.Name "-env" | quote }}
            - secretRef:
                name: {{ print .Release.Name "-secret" | quote }}

          {{- if .Values.app.resources }}
          resources:
          {{- toYaml .Values.app.resources | nindent 12 }}
          {{- end }}

          {{- if .Values.app.livenessProbe }}
          livenessProbe:
          {{- toYaml .Values.app.livenessProbe | nindent 12 }}
          {{- end }}

          {{- if .Values.app.readinessProbe }}
          readinessProbe:
          {{- toYaml .Values.app.readinessProbe | nindent 12 }}
          {{- end }}

          volumeMounts:
            - name: {{ .Release.Name }}-assets
              mountPath: /romm/assets
            - name: {{ .Release.Name }}-games
              mountPath: /romm/library
            - name: {{ .Release.Name }}-resources
              mountPath: /romm/resources
            - name: {{ .Release.Name }}-config
              mountPath: /romm/config
            - name: authelia-fullchain
              mountPath: "{{ .Values.config.oidc.tlsCaCertFile }}"
              subPath: "{{ .Values.config.oidc.tlsCaCertFile | base }}"

      volumes:
        - name: {{ .Release.Name }}-assets
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-assets
        - name: {{ .Release.Name }}-games
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-games
        - name: {{ .Release.Name }}-resources
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-resources
        - name: {{ .Release.Name }}-config
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-config
        - name: authelia-fullchain
          configMap:
            name: authelia-fullchain
            items:
              - key: "{{ .Values.config.oidc.tlsCaCertFile | base }}"
                path: "{{ .Values.config.oidc.tlsCaCertFile | base }}"