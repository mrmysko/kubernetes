apiVersion: v2
name: RomM
description: A helm template for RomM. The database is handled by a clustered MariaDB deployment.
type: application
version: 0.2.0
appVersion: "4.7.0"

dependencies:
  - name: common-labels
    version: 0.1.0
    repository: "file://../../library/common-labels"

  - name: baseResources
    version: 0.1.0
    repository: "file://../../library/baseResources"

  - name: mariadb
    version: 0.1.0
    repository: "file://../../library/mariadb"
    alias: database

  - name: redis
    version: 0.1.0
    repository: "file://../../library/redis"
