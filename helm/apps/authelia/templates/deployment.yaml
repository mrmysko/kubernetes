{{ include "baseResources.service" . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name | quote }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    reloader.stakater.com/auto: "true"

spec:
  revisionHistoryLimit: 3
  replicas: {{ .Values.app.replicaCount | default 1 }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Values.app.name | default .Chart.Name }}"
      app.kubernetes.io/component: frontend

  template:
    metadata:
      labels:
        {{- include "common.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend

    spec:
      enableServiceLinks: false

      initContainers:
        - {{ include "baseResources.waitForMariadb" . | nindent 10 }}

      containers:
        - {{ include "baseResources.baseContainer" . | nindent 10 }}

          command:
            - authelia
          args:
            - "--config=/config/configuration.yml"
            - "--config=/config/configuration.clients.yml"
          ports:
            - containerPort: {{ .Values.service.port }}
            
          securityContext:
            runAsUser: {{ .Values.app.uid }}
            runAsGroup: {{ .Values.app.gid }}
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          envFrom:
            - configMapRef:
                name: "{{ .Release.Name }}-env"
            - secretRef:
                name: "{{ .Release.Name }}-secret"

          {{- with .Values.app.resources }}
          resources:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.app.livenessProbe }}
          livenessProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.app.readinessProbe }}
          readinessProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          volumeMounts:
            - name: "{{ .Release.Name }}-config"
              mountPath: /config
            - name: "{{ .Release.Name }}-cert"
              mountPath: /tmp/certs
              readOnly: true
            - name: "{{ .Release.Name }}-secret"
              mountPath: "{{ .Values.config.secretsDir }}"
              readOnly: true

      volumes:
        - name: "{{ .Release.Name }}-config"
          configMap:
            name: "{{ .Release.Name }}-config"
        - name: "{{ .Release.Name }}-cert"
          secret:
            secretName: "{{ .Release.Name }}-server-cert"
        - name: "{{ .Release.Name }}-secret"
          secret:
            secretName: "{{ .Release.Name }}-secret"