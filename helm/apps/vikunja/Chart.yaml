apiVersion: v2
name: Vikunja
description: A Helm chart for Vikunja. The database is handled by a clustered MariaDB deployment.
type: application
version: 0.3.0
appVersion: "1.0.0-rc2"

dependencies:
  - name: common-labels
    version: 0.1.0
    repository: "file://../../library/common-labels"

  - name: baseResources
    version: 0.1.0
    repository: "file://../../library/baseResources"

  - name: mariadb
    version: 0.1.0
    repository: "file://../../library/mariadb"
    alias: database
