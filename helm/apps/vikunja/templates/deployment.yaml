{{- with .Values.app }}
{{ include "baseResources.service" (dict "root" $ "vals" .) }}
{{- end }}
---
{{- with .Values.app.route }}
{{ include "baseResources.httproute" (dict "root" $ "vals" . ) }}
{{- end }}
---
{{- with .Values.app }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}
  labels:
    {{- include "common.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .component }}
  annotations:
    reloader.stakater.com/auto: "true"

spec:
  revisionHistoryLimit: 3
  replicas: {{ .replicaCount | default 1 }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ .component }}

  template:
    metadata:
      labels:
        {{- include "common.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ .component }}

    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: {{ .gid }}

      containers:
        - {{ include "baseResources.baseContainer" (dict "root" $ "vals" .) | nindent 10 }}

          ports:
            {{- range .service.ports }}
            - name: {{ .name }}
              containerPort: {{ .targetPort }}
              protocol: {{ .protocol }}
            {{- end }}

          envFrom:
            - secretRef:
                name: {{ printf "%s-secret" $.Release.Name }}
            - configMapRef:
                name: {{ printf "%s-env" $.Release.Name }}

          {{- with .resources }}
          resources:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .livenessProbe }}
          livenessProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .readinessProbe }}
          readinessProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          securityContext:
            runAsUser: {{ .uid }}
            runAsGroup: {{ .gid }}
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          volumeMounts:
            - name: config
              mountPath: /app/vikunja/config.yml
              subPath: config.yml
            - name: files
              mountPath: /app/vikunja/files

      volumes:
        - name: config
          configMap:
            name: {{ printf "%s-config" $.Release.Name }}
            items:
              - key: config.yml
                path: config.yml
        - name: files
          persistentVolumeClaim:
            claimName: {{ printf "%s-files" $.Release.Name }}
{{- end }}