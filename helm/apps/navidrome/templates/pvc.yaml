apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ printf "%s-music" .Release.Name }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
spec:
  volumeMode: Filesystem
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 100Gi
  volumeName: {{ printf "%s-music" .Release.Name }}
  storageClassName: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ printf "%s-config-pvc" .Release.Name }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 4Gi
{{- with .Values.storage.config }}
  volumeName: {{ .volumeName | quote }}
{{- end }}