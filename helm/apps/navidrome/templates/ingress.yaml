# This requires traefik crds - https://doc.traefik.io/traefik/getting-started/quick-start-with-kubernetes/
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ print .Release.Name "-route" | quote }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .Values.ingress.baseUrl }}`) && PathPrefix(`/rest`) && ClientIP(`{{ .Values.middleware.whitelist.ip }}`)
      services:
        - name: {{ print .Release.Name "-svc" | quote }}
          port: {{ .Values.service.port }}

    - kind: Rule
      match: Host(`{{ .Values.ingress.baseUrl }}`)
      services:
        - kind: Service
          name: {{ print .Release.Name "-svc" | quote }}
          port: {{ .Values.service.port }}
      middlewares:
        - name: "authelia-forward-auth"
          namespace: traefik