# This volume requires smb csi drivers - https://github.com/kubernetes-csi/csi-driver-smb
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ printf "%s-music" .Release.Name }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  annotations:
    pv.kubernetes.io/provisioned-by: smb.csi.k8s.io
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - file_mode=0664
    - dir_mode=02775
    - uid={{ .Values.app.uid }}
    - gid={{ .Values.app.gid }}
    - noperm
    - noserverino
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: {{ printf "%s-music-volume" .Release.Name }}
    volumeAttributes:
      source: "//{{ .Values.storage.smb.url }}/{{ .Values.storage.smb.share }}"
    nodeStageSecretRef:
      name: {{ printf "%s-smb-credentials" .Release.Name }}
      namespace: kube-system