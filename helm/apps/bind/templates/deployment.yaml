{{- with .Values.bind }}
{{ include "baseResources.service" (dict "root" $ "vals" .) }}
{{- end }}

---
{{- with .Values.bind }}
{{- $fullname := include "baseResources.fullname" (dict "root" $ "vals" .) }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "common.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .component }}
  annotations:
    reloader.stakater.com/auto: "true"

spec:
  revisionHistoryLimit: 3
  replicas: {{ .replicaCount | default 1 }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ .component }}
  template:
    metadata:
      labels:
        {{- include "common.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ .component }}

    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 53

      containers:
        - {{ include "baseResources.baseContainer" (dict "root" $ "vals" . ) | indent 10 }}

          command:
            - named
          args:
            - "-g"
            - "-c"
            - "/etc/bind/named2.conf"
            - "-4"

          ports:
            {{- range .service.ports }}
            - name: {{ .name }}
              containerPort: {{ .targetPort }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}

          {{- with .resources }}
          resources:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .livenessProbe }}
          livenessProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .readinessProbe }}
          readinessProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault

          volumeMounts:
            - name: named
              mountPath: /etc/bind/named2.conf
              subPath: named2.conf
            - name: cache
              mountPath: /var/cache/bind
            - name: run
              mountPath: /run/named

      volumes:
        - name: named
          configMap:
            name: {{ printf "%s-config" $fullname }}
            items:
              - key: named.conf
                path: named2.conf
        - name: cache
          emptyDir:
            medium: Memory
        - name: run
          emptyDir:
            medium: Memory
{{- end }}