{{- with .Values.bind }}
{{ include "baseResources.service" (dict "root" $ "vals" .) }}
{{- end }}
---
{{- with .Values.bind }}
{{- $fullname := include "baseResources.fullname" (dict "root" $ "vals" .) }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "common.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .component }}
  annotations:
    reloader.stakater.com/auto: "true"

spec:
  revisionHistoryLimit: 3
  replicas: {{ .replicaCount | default 1 }}
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ .component }}
  template:
    metadata:
      labels:
        {{- include "common.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ .component }}

    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: {{ printf "%d" (int64 .gid) }}


      initContainers:
        - name: download-rpz
          image: curlimages/curl
          command:
            - sh
            - -c
            - |
              curl -L \
                https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/rpz/multi.txt \
                -o /rpz/hagezi.rpz
          volumeMounts:
            - name: rpz
              mountPath: /rpz

      containers:
        {{- include "baseResources.baseContainer" (dict "root" $ "vals" . ) | indent 8 }}

          command:
            - named
          args:
            - "-g"
            - "-c"
            - "/etc/bind/named2.conf"
            - "-4"

          volumeMounts:
            - name: named-config
              mountPath: /etc/bind/named2.conf
              subPath: named2.conf
            - name: cache
              mountPath: /var/cache/bind
            - name: run
              mountPath: /run/named
            - name: local-block
              mountPath: /etc/bind/local-block.zone
              subPath: local-block.zone
            - name: rpz
              mountPath: /rpz

      volumes:
        - name: named-config
          configMap:
            name: {{ printf "%s-config" $fullname }}
            items:
              - key: named.conf
                path: named2.conf
        - name: cache
          emptyDir:
            medium: Memory
        - name: run
          emptyDir:
            medium: Memory
        - name: local-block
          configMap:
            name: {{ printf "%s-local-block" $fullname }}
            items:
              - key: local-block.zone
                path: local-block.zone
        - name: rpz
          emptyDir: {}
{{- end }}