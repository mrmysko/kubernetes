# This requires traefik crds - https://doc.traefik.io/traefik/getting-started/quick-start-with-kubernetes/
{{- with .Values.victoriametrics }}
{{- $fullname := include "baseResources.fullname" (dict "root" $ "vals" .) }}

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $fullname }}-vmroute
  labels:
    {{- include "common.labels" $ | nindent 4 }}
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .ingress.baseUrl }}`) && PathPrefix(`/select`)
      priority: 100
      services:
        - kind: Service
          name: "vmselect-{{ $fullname }}"
          port: 8481
      middlewares:
        - name: "authelia-forward-auth"
          namespace: traefik

    - kind: Rule
      match: Host(`{{ .ingress.baseUrl }}`) && PathPrefix(`/insert`)
      priority: 90
      services:
        - kind: Service
          name: "vminsert-{{ $fullname }}"
          port: 8480
{{- end }}