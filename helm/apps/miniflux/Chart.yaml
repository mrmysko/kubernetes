apiVersion: v2
name: Miniflux
description: A helm chart for Miniflux RSS-reader. Connecting to a clustered CNPG postgres database.
type: application
version: 0.1.0
appVersion: "2.2.17"

dependencies:
  - name: common-labels
    version: 0.1.0
    repository: "file://../../library/common-labels"

  - name: baseResources
    version: 0.1.0
    repository: "file://../../library/baseResources"

  - name: cnpg-database
    version: 0.1.0
    repository: "file://../../library/cnpg-database"
    alias: mainDb
