apiVersion: v2
name: Immich
description: A Helm chart for Immich. Connecting to a clustered CNPG postgres database.
type: application
version: 0.3.0
appVersion: "v2.5.5"

dependencies:
  - name: common-labels
    version: 0.1.0
    repository: "file://../../library/common-labels"

  - name: baseResources
    version: 0.1.0
    repository: "file://../../library/baseResources"

  - name: cnpg-database
    version: 0.1.0
    repository: "file://../../library/cnpg-database"
    alias: mainDb

  - name: redis
    version: 0.1.0
    repository: "file://../../library/redis"
