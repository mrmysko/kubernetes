app:
  # -- App name
  name: immich
  # -- Number of pods
  replicaCount: 1

  image:
    # -- App image
    repository: ghcr.io/immich-app/immich-server
    # -- Image version
    tag: release
    # -- Image pull policy
    pullPolicy: Always

  # -- Runtime user
  uid:
  # -- Runtime group
  gid:

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      memory: "2Gi"

  livenessProbe:
    httpGet:
      scheme: HTTP
      path: /api/server/ping
      port: 2283
    initialDelaySeconds: 15
    periodSeconds: 10

  readinessProbe:
    httpGet:
      scheme: HTTP
      path: /api/server/ping
      port: 2283
    initialDelaySeconds: 5
    periodSeconds: 5

redis:
  # -- Number of redis pods
  replicaCount: 1
  # -- Redis port
  port: 6379
  # -- Redis username
  user: default
  # -- Redis password
  password:

database:
  # -- Database URL
  host:
  # -- Database namespace
  namespace:
  # -- Database name
  name:
  # -- Database username
  username:
  # -- Database password
  password:

storage:
  smb:
    # -- Samba share URL
    url:
    share:
    # -- Samba username
    username:
    # -- Samba password
    password:

service:
  # -- App port
  port: 2283

ingress:
  # -- FQDN for the application
  baseUrl:

config:
  machineLearning:
    url:
