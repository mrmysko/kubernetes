{{- with .Values.app }}
{{ include "baseResources.service" (dict "root" $ "vals" .) }}
{{- end }}
---
{{- with .Values.app.route }}
{{ include "baseResources.httproute" (dict "root" $ "vals" . ) }}
{{- end }}
---
{{- with .Values.app }}
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ printf "%s-server" $.Release.Name }}
  labels:
    {{- include "common.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ .component }}
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  revisionHistoryLimit: 3
  replicas: {{ .replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ $.Release.Name }}
      app.kubernetes.io/component: {{ .component }}
  template:
    metadata:
      labels:
        {{- include "common.labels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ .component }}
    spec:
      automountServiceAccountToken: false
      initContainers:
        - {{ include "baseResources.waitForPostgres" (dict "root" $ "vals" $.Values) | nindent 10 }}

      containers:
        - {{ include "baseResources.baseContainer" (dict "root" $ "vals" .) | nindent 10 }}

          envFrom:
            - configMapRef:
                name: {{ printf "%s-env" $.Release.Name }}
                optional: false
            - secretRef:
                name: {{ printf "%s-secret" $.Release.Name }}
                optional: false

          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: {{ .uid }}
            runAsGroup: {{ .gid }}
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          {{- with .resources }}
          resources:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .livenessProbe }}
          livenessProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .readinessProbe }}
          readinessProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          volumeMounts:
            - name: library
              mountPath: /data

      volumes:
        - name: library
          persistentVolumeClaim:
            claimName: {{ printf "%s-upload-pvc" $.Release.Name }}
{{- end }}