{{ include "baseResources.service" . }}
---
{{ include "baseResources.ingress" . }}
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ print .Release.Name "-server" | quote }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  revisionHistoryLimit: 3
  replicas: {{ .Values.app.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name | quote }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "common.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      initContainers:
        - name: wait-for-samba
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache samba-client > /dev/null
              echo "Waiting for SMB share "//${SMB_URL}/${SMB_SHARE}"..."
              until smbclient -L "//${SMB_URL}" -U "${SMB_USER}%${SMB_PASS}" -m SMB3 >/dev/null 2>&1; do
                echo "Samba share not ready yet, retrying..."
                sleep 5
              done
              echo "Samba share is available."
          env:
            - name: SMB_URL
              value: "{{ .Values.storage.smb.url }}"
            - name: SMB_SHARE
              value: "{{ .Values.storage.smb.share }}"
            - name: SMB_USER
              value: "{{ .Values.storage.smb.username }}"
            - name: SMB_PASS
              value: "{{ .Values.storage.smb.password }}"

          securityContext:
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

        - name: wait-for-postgres
          image: postgres:17-alpine
          command:
          - sh
          - -c
          - |
            until pg_isready -h {{ .Values.mainDb.host }} -p 5432 -U "{{ .Values.mainDb.owner }}"; do
              echo "Waiting for PostgreSQL to be ready..."
              sleep 2
            done
            echo "PostgreSQL is ready!"
          securityContext:
            capabilities:
              drop: ["ALL"]
            allowPrivilegeEscalation: false

      containers:
        - {{ include "baseResources.baseContainer" . | nindent 10 }}

          envFrom:
            - configMapRef:
                name: {{ print .Release.Name "-env" | quote }}
                optional: false
            - secretRef:
                name: {{ print .Release.Name "-secret" | quote }}
                optional: false

          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: {{ .Values.app.uid }}
            runAsGroup: {{ .Values.app.gid }}
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault

          {{- with .Values.app.resources }}
          resources:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.app.livenessProbe }}
          livenessProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.app.readinessProbe }}
          readinessProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          volumeMounts:
            - name: library
              mountPath: /data

      volumes:
        - name: library
          persistentVolumeClaim:
            claimName: {{ print .Release.Name "-upload-pvc" | quote }}
