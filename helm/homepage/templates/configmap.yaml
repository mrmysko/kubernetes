apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ print .Release.Name "-config" | quote }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
  annotations:
    reloader.stakater.com/auto: "true"
data: # Place config files into files directory
{{- range $path, $bytes := .Files.Glob "files/**" }}
  {{- $ext := ext $path }}
  {{- if or (eq $ext ".yaml") (eq $ext ".css") (eq $ext ".js") }}
  {{ base $path }}: |-
{{ $bytes | toString | replace "[[" "{{" | replace "]]" "}}" | indent 4 }}
  {{- end }}
{{- end }}