apiVersion: v2
name: Miniflux
description: A helm chart for Miniflux RSS-reader. Connecting to a clustered CNPG postgres database.
type: application
version: 0.1.0
appVersion: "2"

dependencies:
  - name: common-labels
    version: 0.1.0
    repository: "file://../common-labels"

  - name: cnpg-database
    version: 0.1.0
    repository: "file://../cnpg-database"
    alias: mainDb
